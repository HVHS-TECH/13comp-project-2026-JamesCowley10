<!DOCTYPE html>
<html lang="en">

<head>
  <title>Guess The Number</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- STYLESHEETS *******************************************-->
  <link rel="stylesheet" href="../game/css/style.css">

  <!-- JQUERY ************************************************-->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <!-- FIREBASE START ****************************************-->
  <link type="text/css" rel="stylesheet" href="https://cdn.firebase.com/libs/firebaseui/3.5.2/firebaseui.css" />
  <!-- FIREBASE END ******************************************-->

</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <script type="module" src="../game/gtnGame.mjs"></script>

  <!-- HTML FOR WAITING FOR ENOUGH PLAYERS -->
  <div id="waitingDiv">
    <h1 id="mainTitle">Waiting for another player..</h1>
    <div id="profileImgs">
      <div class="playerContainer" id="player1">
        <h2 class="playerName" id="player1Name">Waiting...</h2>
        <img class="profileImg" id="player1ProfileImg" src="../../../assets/pfpPlaceholder.jpg"
          alt="Player 1 Profile Image">
      </div>
      <div class="playerContainer" id="player2">
        <h2 class="playerName" id="player2Name">Waiting...</h2>
        <img class="profileImg" id="player2ProfileImg" src="../../../assets/pfpPlaceholder.jpg"
          alt="Player 2 Profile Image">
      </div>
    </div>

    <div id="gameButtons">
      <button id="leaveGameButton">Leave Game</button><br>
    </div>
  </div>
  <!-- END OF HTML FOR WAITING FOR ENOUGH PLAYERS -->

  <!-- HTML FOR GAME -->
  <div hidden="true" id="gameDiv">
    <h1 id="mainTitle">Player 1's Turn</h1>
    <div id="profileImgs">
      <div class="playerContainer" id="player1">
        <h2 class="playerName" id="player1Name">Guessing...</h2>
        <img class="profileImg" id="player1ProfileImg" src="../../../assets/pfpPlaceholder.jpg"
          alt="Player 1 Profile Image">
      </div>
      <div class="playerContainer" id="player2">
        <h2 class="playerName" id="player2Name">Player 2</h2>
        <img class="profileImg" id="player2ProfileImg" src="../../../assets/pfpPlaceholder.jpg"
          alt="Player 2 Profile Image">
      </div>
    </div>

    <div id="gameButtons">
      <input type="number" id="guessInput" placeholder="Enter your guess"><br>
      <button id="leaveGameButton">Guess</button><br>
    </div>
  </div>

</body>

</html>
<!--*************************************************************
  END OF gtnGame.HTML
**************************************************************-->
